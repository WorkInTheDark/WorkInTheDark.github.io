# News items, newest first. To add an item, paste a new entry at the top.
# To delete, just remove its block. `content` supports markdown links and inline HTML.

- date: 2026-03-01
  content: >
    **Five** papers (two first-authored) and one workshop were accepted to **CHI 2026**!

- date: 2026-02-01
  content: >
    **Two** papers (one first-authored) were accepted to **CSCW 2026**!

- date: 2025-11-01
  content: >
    I received a Microsoft Agentic AI Research and Innovation (AARI) award to support my research on [human-agent collaboration](microsoft.com/en-us/research/academic-program/agentic-ai-research-and-innovation/).

- date: 2025-02-01
  content: >
    A Co-first authored survey paper of [LLM Role-Playing Agent Evaluation](https://arxiv.org/abs/2502.13012) is now publicly available.

- date: 2025-01-01
  content: >
    Five papers were accepted to **CHI 2025**!

- date: 2024-10-03
  content: >
    Our paper [StorySparkQA Dataset with Real-World Knowledge for Children Education](https://arxiv.org/abs/2311.09756) was accepted to **EMNLP 2024**

- date: 2024-09-01
  content: >
    Our paper [Secret Use of Large Language Models](https://arxiv.org/abs/2409.19450) was accepted to **CSCW 2025**

- date: 2024-07-01
  content: >
    Our paper [Early Sepsis Prediction with Uncertainty Quantification and Active Sensing](https://dl.acm.org/doi/abs/10.1145/3637528.3671586) was accepted to **KDD 2024**

- date: 2024-04-01
  content: >
    Our papers [LLM-based Voice Assistant for Asynchronous Older Adults-Care Provider Communication](https://dl.acm.org/doi/abs/10.1145/3659625) and [Mental-LLM](https://dl.acm.org/doi/abs/10.1145/3643540) were accepted to **IMWUT 2024**

- date: 2024-03-13
  content: >
    First-authored paper [In-Context Sampling Strategy for Reliable LLM Prompting](https://arxiv.org/abs/2311.09782) was accepted to **NAACL 2024 Findings**

- date: 2024-03-04
  content: >
    Guest talk at USC titled **"Bridging AI Research and Real-world Scenarios"**. Thanks Prof. Yao Du for the invitation!

- date: 2024-02-01
  content: >
    I am joining Prof. [Dakuo Wang](https://www.dakuowang.com/)'s Human-Centered AI Lab at Northeastern University as a **postdoc associate**!

- date: 2024-01-22
  content: >
    Two of our papers, [Human-AI Collaboration in Sepsis Diagnosis](https://arxiv.org/abs/2309.12368) and [User's Sensitive Disclosure with LLM](https://arxiv.org/abs/2309.11653) were accepted to **CHI 2024**

- date: 2024-01-04
  content: >
    I passed the Ph.D. dissertation defense. My deepest gratitude to all those who supported and helped me, especially Prof. [Jim Hendler](https://en.wikipedia.org/wiki/James_Hendler) and Prof. [Dakuo Wang](https://www.dakuowang.com/)

- date: 2023-10-08
  content: >
    Our paper [Discourse Framework for Science Journalism](https://arxiv.org/abs/2310.15077) was accepted to **<span class="conference">EMNLP 2023</span>**, and another first-authored paper [Active Learning Empowered by Natural Language Explanations](https://arxiv.org/abs/2305.12710) was accepted to **<span class="conference">EMNLP 2023 Findings</span>**

- date: 2023-07-09
  content: >
    First-authored paper [Objective Evaluation of Human Explanations](https://arxiv.org/abs/2305.03117) was accepted to **<span class="conference">ACL 2023</span>** for Oral Presentation

- date: 2022-05-22
  content: >
    Two first-authored papers, [QA-Pair Generation for Story Books](https://aclanthology.org/2022.acl-long.54/) and [FairytaleQA Dataset](https://aclanthology.org/2022.acl-long.34/) were accepted to **<span class="conference">ACL 2022</span>**

- date: 2022-04-30
  content: >
    Our paper [StoryBuddy](https://dl.acm.org/doi/abs/10.1145/3491102.3517479) was accepted to **<span class="conference">CHI 2022</span>**

- date: 2021-09-21
  content: >
    Our paper [Narrative Open-Domain QA Techniques](https://direct.mit.edu/tacl/article/doi/10.1162/tacl_a_00411/107386/Narrative-Question-Answering-with-Cutting-Edge) was accepted to **<span class="conference">TACL 2021</span>**

- date: 2020-03-17
  content: >
    Our paper [Trust in AutoML](https://dl.acm.org/doi/abs/10.1145/3377325.3377501) was accepted to **<span class="conference">IUI 2020</span>**
